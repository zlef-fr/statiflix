<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--zlef-seo-->
  <meta name="description" content="Statiflix mobile — your Netflix viewing stats, end-to-end encrypted and decrypted right on your phone.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b0b0f">
  <meta name="color-scheme" content="dark">
  <link rel="icon" href="https://assets.zlef.fr/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="https://assets.zlef.fr/favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="https://assets.zlef.fr/apple-touch-icon.png">
  <!--/zlef-seo-->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Statiflix</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="pwa.css">
</head>
<body class="pwa">
  <header class="pwa-top">
    <div class="brand">
      <span class="mark">S</span>
      <span class="word">STATI<span class="x">FLIX</span></span>
    </div>
  </header>

  <main id="app" class="pwa-wrap"></main>

  <div id="state" class="pwa-state">
    <span class="mark big">S</span>
    <p id="stateMsg" data-i18n="pwa.loading"></p>
    <div id="spin" class="big-spin"></div>
  </div>

  <footer class="pwa-foot">
    <span data-i18n="pwa.secured"></span>
  </footer>

  <script src="i18n.js"></script>
  <script src="../assets/qrcode.min.js"></script>
  <script src="crypto.js"></script>
  <script src="render.js"></script>
  <script src="app.js"></script>
</body>
</html>
